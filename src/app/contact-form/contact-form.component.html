<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm" (click)="onClose()" data-testid="modal-overlay">
<!-- Modal Content -->
<div class="relative w-full max-w-lg glass-panel professional-shadow rounded-2xl overflow-hidden border border-slate-700" (click)="$event.stopPropagation()" data-testid="contact-modal">
<!-- Handle/Header Area -->
<div class="flex flex-col items-stretch">
<div class="flex h-6 w-full items-center justify-center">
<div class="h-1 w-12 rounded-full bg-slate-700"></div>
</div>
<div class="flex items-center px-6 pb-2 justify-between">
<div class="text-slate-400 flex size-10 shrink-0 items-center justify-center rounded-lg hover:bg-slate-800 cursor-pointer transition-colors" (click)="onClose()" data-testid="close-modal-btn">
<span class="material-symbols-outlined">close</span>
</div>
<h2 class="text-slate-100 text-lg font-semibold leading-tight tracking-tight flex-1 text-center pr-10">Contact Support</h2>
</div>
<div class="px-8 pt-8 pb-6 border-b border-slate-800">
<h3 class="text-white tracking-tight text-2xl font-bold leading-tight">Cyber Shomrim Community Support</h3>
<p class="text-slate-400 text-sm mt-2 font-normal">Our team is available to help with any technical inquiries or community concerns.</p>
</div>
</div>

<div *ngIf="submitSuccess" class="px-8 py-8 space-y-5" data-testid="success-message">
  <p class="text-green-400 font-bold">Thank you! Your message has been sent successfully. We will get back to you shortly.</p>
  <button (click)="onClose()" class="w-full px-6 py-3.5 rounded-lg bg-primary text-white font-semibold flex items-center justify-center hover:bg-blue-600 transition-all" data-testid="success-close-btn">Close</button>
</div>

<!-- Form Fields -->
<form *ngIf="!submitSuccess" [formGroup]="contactForm" (ngSubmit)="onSubmit()" data-testid="contact-form" class="px-8 py-8 space-y-5">
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1.5">
<label for="name" class="text-xs font-semibold text-slate-300 ml-1">Full Name</label>
<input id="name" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-slate-100 placeholder:text-slate-500 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" placeholder="John Doe" type="text" formControlName="name" data-testid="input-name" />
</div>
<div class="space-y-1.5">
<label class="text-xs font-semibold text-slate-300 ml-1">Email Address *</label>
<input class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-slate-100 placeholder:text-slate-500 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" placeholder="email@example.com" type="email" formControlName="email" data-testid="input-email" />
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="text-xs font-semibold text-slate-300 ml-1">Phone Number *</label>
<input class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-slate-100 placeholder:text-slate-500 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" placeholder="+1 (555) 000-0000" type="tel" formControlName="phone" data-testid="input-phone" />
</div>
<div class="space-y-1.5">
<label class="text-xs font-semibold text-slate-300 ml-1">Organization</label>
<input class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-slate-100 placeholder:text-slate-500 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" placeholder="Company Name" type="text" formControlName="company" data-testid="input-company" />
</div>
</div>
<div class="space-y-1.5">
<label class="text-xs font-semibold text-slate-300 ml-1">How can we help?</label>
<textarea class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-slate-100 placeholder:text-slate-500 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all resize-none" placeholder="Please provide details about your request..." rows="4" formControlName="message" data-testid="input-message"></textarea>
</div>

<div *ngIf="submitError" class="text-red-500 text-sm font-semibold" data-testid="error-message">
  Failed to send message. Please try again.
</div>

<!-- Footer Buttons -->
<div class="flex gap-4 pt-4">
<button type="button" class="flex-1 px-6 py-3.5 rounded-lg border border-slate-700 text-slate-300 font-semibold text-sm hover:bg-slate-800 transition-all" (click)="onClose()" data-testid="cancel-btn">
Cancel
</button>
<button type="submit" [disabled]="isSubmitting" class="flex-[2] px-6 py-3.5 rounded-lg bg-primary text-white font-semibold text-sm shadow-lg shadow-primary/20 flex items-center justify-center gap-2 hover:bg-blue-600 active:scale-[0.98] transition-all disabled:opacity-50" data-testid="submit-btn">
<span class="material-symbols-outlined text-sm">send</span>
{{ isSubmitting ? 'Sending...' : 'Send Message' }}
</button>
</div>
</form>
</div>
</div>
